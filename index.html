<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hotel-markdown</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, system-ui, sans-serif; line-height: 1.6; padding: 2rem; max-width: 800px; margin: 0 auto; color: #1a1a1a; }
    h1 { margin-bottom: 0.5rem; }
    .description { margin-bottom: 2rem; color: #555; }
    label { display: block; font-weight: 500; margin-bottom: 0.25rem; }
    .help { font-size: 0.85rem; color: #666; margin-top: 0.25rem; }
    .field { margin-bottom: 1rem; }
    .error { color: #c00; font-size: 0.85rem; margin-top: 0.25rem; display: none; }
    .submitted { padding: 2rem; background: #f0f9f0; border-radius: 8px; text-align: center; }
    .submitted h2 { color: #1a7a1a; }
  </style>
</head>
<body>
  <div id="app">Loading form...</div>
  <script src="renderer.js"></script>
</body>
</html>
